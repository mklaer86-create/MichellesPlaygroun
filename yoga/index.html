<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>Raja · Yoga</title>
<style>
*  { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:   #0f0f1a;
  --card: #1a1a2e;
  --bdr:  rgba(255,255,255,0.09);
  --gold: #c9a84c;
  --gdim: rgba(201,168,76,0.15);
  --purp: #7b68ee;
  --teal: #4ecdc4;
  --red:  #ff6b6b;
  --text: #e8e8f0;
  --dim:  #55607a;
}

html { height:100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── HEADER ─────────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
  flex-shrink: 0;
  gap: 8px;
}

.pose-num {
  font-size: 11px;
  color: var(--dim);
  min-width: 48px;
  font-variant-numeric: tabular-nums;
  letter-spacing: .04em;
}

.pills {
  display: flex;
  gap: 3px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--bdr);
  border-radius: 22px;
  padding: 3px;
}

.pill {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 11px;
  border-radius: 18px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.pill.on { background: var(--gold); color: #1a1200; }

.pause-btn {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 18px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
}
.pause-btn:active { opacity: .6; }

/* ── TIMER BAR ──────────────────────── */
.bar-wrap {
  padding: 0 16px 6px;
  flex-shrink: 0;
}
.bar-track { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.bar-fill  { height: 100%; background: var(--gold); width: 0%; transition: width 1s linear; }

/* ── DOTS ───────────────────────────── */
.dots-wrap {
  display: flex;
  gap: 3px;
  padding: 2px 16px 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.dots-wrap::-webkit-scrollbar { display: none; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.1); flex-shrink: 0; transition: all .2s; }
.dot.done { background: rgba(201,168,76,.3); }
.dot.cur  { background: var(--gold); width: 14px; border-radius: 3px; }

/* ── CURRENT CARD ───────────────────── */
.now-card {
  flex: 1;
  margin: 0 12px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 20px 12px;
  min-height: 0;
  position: relative;
  overflow: hidden;
  touch-action: none;
}
.now-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,168,76,.06) 0%, transparent 70%);
  pointer-events: none;
}

/* Figure box — fixed pixel size so it always renders */
.fig-box {
  width: 160px;
  height: 180px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
@media (max-height: 620px) {
  .fig-box { width: 120px; height: 130px; }
}
.fig-box svg { width: 100%; height: 100%; display: block; }
.fig-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 6px;
}

.now-name {
  font-size: clamp(17px, 5vw, 24px);
  font-weight: 700;
  text-align: center;
  margin-top: 12px;
  line-height: 1.2;
}
.now-sub {
  font-size: 13px;
  color: var(--dim);
  text-align: center;
  margin-top: 4px;
  min-height: 18px;
  line-height: 1.4;
}
.now-breath {
  margin-top: 10px;
  background: var(--gdim);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 20px;
}

/* ── NAV BUTTONS ─────────────────────── */
.nav-row {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  padding: 13px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:active { background: rgba(255,255,255,.07); }
.nav-btn.off    { opacity: .25; pointer-events: none; }

/* ── NEXT CARDS ─────────────────────── */
.next-row {
  display: flex;
  gap: 8px;
  padding: 0 12px 12px;
  flex-shrink: 0;
}
.next-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  transition: opacity .3s;
}
.next-card:nth-child(1) { opacity: .7;  }
.next-card:nth-child(2) { opacity: .38; }

.nfig { width: 38px; height: 38px; flex-shrink: 0; }
.nfig svg { width: 100%; height: 100%; display: block; }
.nfig img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }

.ninfo { flex: 1; min-width: 0; }
.nlbl  { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
.nname { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nbr   { font-size: 10px; color: var(--dim); margin-top: 1px; }

/* ── CARD ANIMATIONS ─────────────────── */
.out-l { animation: outL .18s ease forwards; }
.in-r  { animation: inR  .18s ease forwards; }
.out-r { animation: outR .18s ease forwards; }
.in-l  { animation: inL  .18s ease forwards; }
@keyframes outL { to   { transform: translateX(-50px); opacity: 0; } }
@keyframes inR  { from { transform: translateX(50px);  opacity: 0; } }
@keyframes outR { to   { transform: translateX(50px);  opacity: 0; } }
@keyframes inL  { from { transform: translateX(-50px); opacity: 0; } }

/* ── DONE SCREEN ──────────────────────── */
.done-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 32px;
  z-index: 100;
}
.done-screen.show { display: flex; }
.done-icon  { font-size: 64px; margin-bottom: 4px; }
.done-title { font-size: 28px; font-weight: 700; }
.done-sub   { font-size: 15px; color: var(--dim); text-align: center; line-height: 1.55; }
.restart-btn {
  margin-top: 20px;
  background: var(--gold);
  color: #1a1200;
  border: none;
  border-radius: 28px;
  padding: 15px 36px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

/* ── CAMERA BUTTON ────────────────────── */
.cam-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 18px;
  color: var(--dim);
  font-size: 11px;
  padding: 5px 10px;
  cursor: pointer;
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
.cam-btn:active { background: rgba(255,255,255,0.15); color: var(--text); }
</style>
</head>

  med:"med", bnd:"bnd", std:"std", w1:"w1", w2:"w2",
  ddg:"ddg", fld:"fld", bck:"bck", whl:"whl", inv:"inv",
  plk:"plk", tri:"tri", bal:"bal", lng:"lng", arm:"arm",
  spl:"spl", pgn:"pgn", twi:"twi", sit:"sit", ply:"ply", rst:"rst",
  hlf:"hlf",
};

// ─── STATE ───────────────────────────────────────────────────────────────────
var idx     = 0;
var timerS  = 30;
var elapsed = 0;
var paused  = false;
var ticker  = null;

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  buildDots();
  render();
  startTicker();
  setupGestures();
}

// ─── DOTS ────────────────────────────────────────────────────────────────────
function buildDots() {
  var html = '';
  for (var i = 0; i < SEQ.length; i++) html += '<div class="dot" id="dot' + i + '"></div>';
  document.getElementById("dotsWrap").innerHTML = html;
}

function syncDots() {
  for (var i = 0; i < SEQ.length; i++) {
    var d = document.getElementById('dot' + i);
    if (!d) continue;
    d.className = 'dot' + (i < idx ? ' done' : i === idx ? ' cur' : '');
  }
  var cur = document.getElementById('dot' + idx);
  if (cur) cur.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function figHTML(p, size, i) {
  if (i !== undefined) {
    var stored;
    try { stored = localStorage.getItem('pose_img_' + i); } catch(e) {}
    if (stored) return '<img src="' + stored + '" alt="' + p.n + '" style="max-width:' + size + 'px;max-height:' + size + 'px;object-fit:contain;border-radius:6px;">';
  }
  if (p.img) return '<img src="images/' + p.img + '" alt="' + p.n + '" style="max-width:' + size + 'px;max-height:' + size + 'px;object-fit:contain;border-radius:6px;">';
  return FIG[CAT_FIG[p.c]] || FIG.std;
}

function render() {
  var p = SEQ[idx];
  document.getElementById("poseNum").textContent    = (idx + 1) + ' / ' + SEQ.length;
  document.getElementById("figBox").innerHTML        = figHTML(p, 160, idx);
  document.getElementById("poseName").textContent   = p.n;
  document.getElementById("poseSub").textContent    = p.s;
  document.getElementById("poseBreath").textContent = p.b;
  document.getElementById("prevBtn").classList.toggle("off", idx === 0);
  document.getElementById("nextBtn").classList.toggle("off", idx === SEQ.length - 1);
  renderNext(1, idx + 1);
  renderNext(2, idx + 2);
  syncDots();
  resetBar();
}

function renderNext(slot, i) {
  var card = document.getElementById('nc' + slot);
  if (i >= SEQ.length) {
    card.style.opacity = '0.15';
    document.getElementById('nn' + slot).textContent = slot === 1 ? 'End of sequence' : '—';
    document.getElementById('nb' + slot).textContent = '';
    document.getElementById('nf' + slot).innerHTML   = '';
    return;
  }
  card.style.opacity = slot === 1 ? '0.72' : '0.40';
  var p = SEQ[i];
  document.getElementById('nf' + slot).innerHTML   = figHTML(p, 38, i);
  document.getElementById('nn' + slot).textContent = p.s ? p.n + ' · ' + p.s : p.n;
  document.getElementById('nb' + slot).textContent = p.b;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function advance() {
  if (idx >= SEQ.length - 1) { showDone(); return; }
  animCard('out-l', 'in-r', function() { idx++; render(); });
}

function goBack() {
  if (idx <= 0) return;
  animCard('out-r', 'in-l', function() { idx--; render(); });
}

function animCard(outCls, inCls, cb) {
  var el = document.getElementById('nowCard');
  el.classList.add(outCls);
  setTimeout(function() {
    el.classList.remove(outCls);
    cb();
    el.classList.add(inCls);
    setTimeout(function() { el.classList.remove(inCls); }, 250);
  }, 170);
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(function() {
    if (paused) return;
    elapsed++;
    document.getElementById('barFill').style.width = (elapsed / timerS * 100) + '%';
    if (elapsed >= timerS) { elapsed = 0; advance(); }
  }, 1000);
}

function resetBar() {
  elapsed = 0;
  document.getElementById('barFill').style.width = '0%';
}

function setTimer(s) {
  timerS = s; elapsed = 0;
  var pills = document.querySelectorAll('.pill');
  for (var i = 0; i < pills.length; i++)
    pills[i].classList.toggle('on', parseInt(pills[i].dataset.s) === s);
  document.getElementById('barFill').style.width = '0%';
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
}

// ─── GESTURES ────────────────────────────────────────────────────────────────
function setupGestures() {
  var card = document.getElementById('nowCard');
  var startX = 0, startY = 0, wasTouched = false, swipeHandled = false;

  card.addEventListener('touchstart', function(e) {
    startX       = e.touches[0].clientX;
    startY       = e.touches[0].clientY;
    wasTouched   = true;
    swipeHandled = false;
  }, {passive: true});

  card.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (dx < -50 && Math.abs(dy) < 80) { swipeHandled = true; advance(); return; }
    if (dx >  50 && Math.abs(dy) < 80) { swipeHandled = true; goBack();  return; }
  }, {passive: true});

  card.addEventListener('click', function() {
    if (wasTouched) {
      wasTouched = false;
      if (!swipeHandled) advance();
      return;
    }
    advance();
  });
}

// ─── PHOTO PICKER ────────────────────────────────────────────────────────────
function pickImage() {
  var inp = document.getElementById('imgPicker');
  inp.onchange = function() {
    if (!inp.files || !inp.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      resizeImage(e.target.result, 400, 400, function(dataUrl) {
        try { localStorage.setItem('pose_img_' + idx, dataUrl); } catch(ex) {}
        render();
      });
    };
    reader.readAsDataURL(inp.files[0]);
    inp.value = '';
  };
  inp.click();
}

function resizeImage(dataUrl, maxW, maxH, cb) {
  var img = new Image();
  img.onload = function() {
    var w = img.width, h = img.height;
    var scale = Math.min(maxW / w, maxH / h, 1);
    var canvas = document.createElement('canvas');
    canvas.width  = Math.round(w * scale);
    canvas.height = Math.round(h * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', 0.78));
  };
  img.src = dataUrl;
}

// ─── DONE ────────────────────────────────────────────────────────────────────
function showDone() {
  clearInterval(ticker);
  document.getElementById('doneScreen').classList.add('show');
}

function restart() {
  idx = 0; elapsed = 0; paused = false;
  document.getElementById('pauseBtn').textContent = '⏸';
  document.getElementById('doneScreen').classList.remove('show');
  render();
  startTicker();
}

// ─── START ───────────────────────────────────────────────────────────────────
window.addEventListener('load', init);
</script>
