<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6b8f71">
<title>Flow Cards — Practice</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header id="site-nav"></header>

<main class="page">
  <div class="page-header">
    <div>
      <h1>Choose a sequence</h1>
      <p>Tap a flow to step through it, pose by pose.</p>
    </div>
  </div>

  <div id="sequenceGrid" class="grid"></div>
</main>

<script type="module">
  import { renderNav, registerServiceWorker } from "./js/app.js";
  import { loadAll, resolveSequenceSteps, isDataUnavailable } from "./js/data.js";
  import { resolveImageSrc } from "./js/state.js";

  renderNav("home");
  registerServiceWorker();

  async function render() {
    const { sequences } = await loadAll();
    const grid = document.getElementById("sequenceGrid");

    if (sequences.length === 0) {
      if (isDataUnavailable()) {
        grid.innerHTML = `<div class="empty-state">Can't reach the sequence library right now — your data is safe on GitHub.<br>Check your connection or try again in a minute.<br><br><button class="btn-primary" onclick="location.reload()">Try again</button></div>`;
      } else {
        grid.innerHTML = `<div class="empty-state">No sequences yet. Head to <a href="builder.html">Sequences</a> to build your first one.</div>`;
      }
      return;
    }

    grid.innerHTML = sequences
      .map((seq) => {
        const steps = resolveSequenceSteps(seq);
        const cover = steps.find((s) => s.image)?.image;
        return `
          <a class="sequence-card" href="play.html?seq=${encodeURIComponent(seq.id)}">
            ${cover ? `<img src="${resolveImageSrc(cover)}" alt="" class="pose-thumb" onerror="this.onerror=null;this.src='images/poses/_placeholder.svg'">` : ""}
            <h3>${seq.name}</h3>
            <div class="meta">${steps.length} pose${steps.length === 1 ? "" : "s"}${seq.description ? " · " + seq.description : ""}</div>
          </a>
        `;
      })
      .join("");
  }

  render();
</script>
</body>
</html>
