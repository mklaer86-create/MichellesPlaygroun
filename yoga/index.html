<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>Raja · Yoga Sequence</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0f0f1a;
  --card:     #1a1a2e;
  --border:   rgba(255,255,255,0.07);
  --gold:     #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --purple:   #7b68ee;
  --teal:     #4ecdc4;
  --coral:    #ff6b6b;
  --text:     #e8e8f0;
  --muted:    #606880;
}

html { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── HEADER ─────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 6px;
  gap: 10px;
  flex-shrink: 0;
}

.counter {
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  min-width: 54px;
}

.timer-pills {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 3px;
}

.pill {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  padding: 4px 11px;
  border-radius: 18px;
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
}

.pill.on {
  background: var(--gold);
  color: #1a1400;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 16px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  transition: color 0.2s;
}
.ctrl-btn:active { transform: scale(0.88); }

/* ── PROGRESS BAR ───────────────────────────────────────── */
.bar-wrap {
  padding: 2px 16px 0;
  flex-shrink: 0;
}

.bar-track {
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 1px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 1px;
  width: 0%;
  transition: width 1s linear;
}

/* ── DOTS ───────────────────────────────────────────────── */
.dots-row {
  display: flex;
  gap: 3px;
  padding: 8px 16px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
}
.dots-row::-webkit-scrollbar { display: none; }

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
  transition: all 0.25s;
}
.dot.done    { background: rgba(201,168,76,0.3); }
.dot.current { background: var(--gold); width: 14px; border-radius: 3px; }

/* ── MAIN ───────────────────────────────────────────────── */
.main {
  flex: 1;
  padding: 6px 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}

/* ── CURRENT CARD ───────────────────────────────────────── */
.now-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 20px 14px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 0;
  touch-action: none;
}

.now-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.fig-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  width: 100%;
  padding: 4px 0;
}

.fig-area svg {
  max-height: min(44vw, 220px);
  max-width: min(44vw, 220px);
  width: 100%;
  height: 100%;
}

.now-name {
  font-size: clamp(19px, 5.5vw, 26px);
  font-weight: 700;
  text-align: center;
  line-height: 1.2;
  margin-top: 10px;
}

.now-sub {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin-top: 4px;
  line-height: 1.4;
  min-height: 18px;
}

.now-breaths {
  margin-top: 9px;
  background: var(--gold-dim);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: 20px;
}

.swipe-hint {
  position: absolute;
  bottom: 11px;
  right: 15px;
  font-size: 10px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 0.02em;
}

/* ── NEXT CARDS ─────────────────────────────────────────── */
.next-row {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.next-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: opacity 0.3s;
}

.next-card:nth-child(1) { opacity: 0.65; }
.next-card:nth-child(2) { opacity: 0.38; }

.nf {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nf svg { width: 100%; height: 100%; }

.ni { flex: 1; min-width: 0; }

.ni-label {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}

.ni-name {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.ni-b {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── ANIMATIONS ─────────────────────────────────────────── */
.out-left  { animation: outL 0.22s ease forwards; }
.in-right  { animation: inR 0.22s ease forwards; }
.out-right { animation: outR 0.22s ease forwards; }
.in-left   { animation: inL 0.22s ease forwards; }

@keyframes outL { to   { transform: translateX(-45px); opacity: 0; } }
@keyframes inR  { from { transform: translateX(45px);  opacity: 0; } }
@keyframes outR { to   { transform: translateX(45px);  opacity: 0; } }
@keyframes inL  { from { transform: translateX(-45px); opacity: 0; } }

/* ── DONE SCREEN ────────────────────────────────────────── */
.done-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 32px;
  z-index: 99;
}
.done-screen.show { display: flex; }

.done-glyph { font-size: 64px; line-height: 1; margin-bottom: 4px; }
.done-title { font-size: 30px; font-weight: 700; }
.done-sub   { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.5; }

.restart-btn {
  margin-top: 20px;
  background: var(--gold);
  color: #1a1400;
  border: none;
  border-radius: 28px;
  padding: 15px 36px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
}
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="counter" id="counter">1 / 1</div>
  <div class="timer-pills">
    <button class="pill" data-s="15" onclick="setTimer(15)">15s</button>
    <button class="pill on" data-s="30" onclick="setTimer(30)">30s</button>
    <button class="pill" data-s="45" onclick="setTimer(45)">45s</button>
  </div>
  <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
</div>

  <div class="next-row">

    </div>

        <div class="ni-name" id="nn2"></div>
        <div class="ni-b" id="nb2"></div>
      </div>
    </div>
  </div>
</div>

<!-- DONE SCREEN -->
<div class="done-screen" id="doneScreen">

  <div class="done-sub">Practice complete.<br>Well done, Michelle.</div>
  <button class="restart-btn" onclick="restart()">Practice Again</button>

// Map pose category → figure key
const CAT_FIG = {
  pranayama:"pranayama", bandha:"bandha", breath:"breath",
  flow:"flow", warrior1:"warrior1", warrior2:"warrior2",
  downdog:"downdog", fold:"fold", backbend:"backbend",
  wheel:"wheel", invert:"invert", plank:"plank",
  triangle:"triangle", balance:"balance", lunge:"lunge",
  arm:"arm", split:"split", pigeon:"pigeon",
  twist:"twist", seated:"seated", intention:"intention",
  play:"play", rest:"rest",
};

// ─── STATE ────────────────────────────────────────────────────────────────
let idx     = 0;
let secs    = 30;
let elapsed = 0;
let paused  = false;
let ticker  = null;

// ─── INIT ─────────────────────────────────────────────────────────────────
function init() {
  buildDots();
  render();
  startTicker();
  setupGestures();
}

// ─── DOTS ─────────────────────────────────────────────────────────────────
function buildDots() {
  const row = document.getElementById("dotsRow");
  row.innerHTML = SEQ.map((_, i) => `<div class="dot" id="d${i}"></div>`).join("");
}

function syncDots() {
  SEQ.forEach((_, i) => {
    const d = document.getElementById(`d${i}`);
    if (!d) return;
    d.className = "dot" + (i < idx ? " done" : i === idx ? " current" : "");
  });
  const cur = document.getElementById(`d${idx}`);
  if (cur) cur.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function render() {
  const p = SEQ[idx];
  document.getElementById("counter").textContent = `${idx + 1} / ${SEQ.length}`;
  const fig = FIGS[CAT_FIG[p.c]] || FIGS.breath;
  document.getElementById("figArea").innerHTML = fig;
  document.getElementById("nowName").textContent = p.n;
  document.getElementById("nowSub").textContent  = p.s;
  const bEl = document.getElementById("nowBreaths");
  bEl.textContent = p.b;
  bEl.style.display = p.b ? "" : "none";
  renderNext(1, idx + 1);
  renderNext(2, idx + 2);
  syncDots();
  resetBar();
}

function renderNext(slot, i) {
  const nameEl   = document.getElementById(`nn${slot}`);
  const breathEl = document.getElementById(`nb${slot}`);
  const figEl    = document.getElementById(`nf${slot}`);
  const card     = document.getElementById(`nc${slot}`);
  if (i >= SEQ.length) {
    card.style.opacity = "0.18";
    nameEl.textContent   = slot === 1 ? "End of sequence" : "—";
    breathEl.textContent = "";
    figEl.innerHTML      = "";
    return;
  }
  card.style.opacity = slot === 1 ? "0.65" : "0.38";
  const p = SEQ[i];
  figEl.innerHTML      = FIGS[CAT_FIG[p.c]] || FIGS.breath;
  nameEl.textContent   = p.s ? `${p.n} · ${p.s}` : p.n;
  breathEl.textContent = p.b;
}

// ─── ADVANCE / BACK ───────────────────────────────────────────────────────
function advance() {
  if (idx >= SEQ.length - 1) { showDone(); return; }
  animCard("out-left","in-right", () => { idx++; render(); });
}

function goBack() {
  if (idx <= 0) return;
  animCard("out-right","in-left", () => { idx--; render(); });
}

function animCard(outCls, inCls, cb) {
  const card = document.getElementById("nowCard");
  card.classList.add(outCls);
  setTimeout(() => {
    card.classList.remove(outCls);
    cb();
    card.classList.add(inCls);
    setTimeout(() => card.classList.remove(inCls), 280);
  }, 200);
}

// ─── TIMER ────────────────────────────────────────────────────────────────
function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    if (paused) return;
    elapsed++;
    updateBar();
    if (elapsed >= secs) { elapsed = 0; advance(); }
  }, 1000);
}

function resetBar() { elapsed = 0; updateBar(); }

function updateBar() {
  document.getElementById("barFill").style.width = `${(elapsed / secs) * 100}%`;
}

function setTimer(s) {
  secs = s;
  elapsed = 0;
  document.querySelectorAll(".pill").forEach(b =>
    b.classList.toggle("on", parseInt(b.dataset.s) === s));
  updateBar();
}

function togglePause() {
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "▶" : "⏸";
}

// ─── GESTURES ─────────────────────────────────────────────────────────────
function setupGestures() {
  const card = document.getElementById("nowCard");
  let sx = 0, sy = 0, st = 0, touched = false;

  card.addEventListener("touchstart", e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    touched = true;
  }, { passive: true });

  card.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Date.now() - st;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18 && dt < 450) {
      advance();
    } else if (dx < -50 && Math.abs(dy) < 70) {
      advance();
    } else if (dx > 50 && Math.abs(dy) < 70) {
      goBack();
    }
  }, { passive: true });

  // Desktop fallback
  card.addEventListener("click", () => {
    if (touched) { touched = false; return; }
    advance();
  });
}

// ─── DONE ─────────────────────────────────────────────────────────────────
function showDone() {
  clearInterval(ticker);
  document.getElementById("doneScreen").classList.add("show");
}

function restart() {
  idx = 0; elapsed = 0; paused = false;
  document.getElementById("pauseBtn").textContent = "⏸";
  document.getElementById("doneScreen").classList.remove("show");
  render();
  startTicker();
}

// ─── GO ───────────────────────────────────────────────────────────────────
init();
</script>
